name: Deploy worker to Cloud Run

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  GCP_REGION: ${{ vars.GCP_REGION }}
  AR_REPOSITORY: ${{ vars.AR_REPOSITORY }}
  SERVICE_NAME: ${{ vars.SERVICE_NAME }}

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests (with coverage gate)
        run: pytest

  deploy:
    name: Build and deploy
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build and push image
        env:
          IMAGE_URI: ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.AR_REPOSITORY }}/${{ env.SERVICE_NAME }}:${{ github.sha }}
        run: |
          docker build -t "$IMAGE_URI" .
          docker push "$IMAGE_URI"
          echo "IMAGE_URI=$IMAGE_URI" >> $GITHUB_ENV

      - name: Debug — show resolved deploy vars
        run: |
          echo "SERVICE_NAME=${{ env.SERVICE_NAME }}"
          echo "RUNTIME_SERVICE_ACCOUNT=${{ vars.RUNTIME_SERVICE_ACCOUNT }}"
          echo "VPC_CONNECTOR=${{ vars.VPC_CONNECTOR }}"
          echo "VPC_NETWORK=${{ vars.VPC_NETWORK }}"
          echo "VPC_SUBNET=${{ vars.VPC_SUBNET }}"
          echo "CLOUD_SQL_INSTANCE=${{ vars.CLOUD_SQL_INSTANCE }}"
          echo "KAFKA_ENABLED=${{ vars.KAFKA_ENABLED }}"
          echo "KAFKA_BOOTSTRAP_SERVERS=${{ vars.KAFKA_BOOTSTRAP_SERVERS }}"
          echo "KAFKA_TOPIC=${{ vars.KAFKA_TOPIC }}"
          echo "KAFKA_GROUP_ID=${{ vars.KAFKA_GROUP_ID }}"
          echo "KAFKA_SECURITY_PROTOCOL=${{ vars.KAFKA_SECURITY_PROTOCOL }}"
          echo "MIN_INSTANCES=${{ vars.MIN_INSTANCES }}"
          echo "MAX_INSTANCES=${{ vars.MAX_INSTANCES }}"

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.GCP_REGION }}
          image: ${{ env.IMAGE_URI }}
          flags: >-
            --allow-unauthenticated
            --port=8000
            --no-cpu-throttling
            --min-instances=${{ vars.MIN_INSTANCES || '1' }}
            --max-instances=${{ vars.MAX_INSTANCES || '3' }}
            ${{ vars.RUNTIME_SERVICE_ACCOUNT && format('--service-account={0}', vars.RUNTIME_SERVICE_ACCOUNT) || '' }}
            ${{ vars.CLOUD_SQL_INSTANCE && format('--add-cloudsql-instances={0}', vars.CLOUD_SQL_INSTANCE) || '' }}
            ${{ vars.VPC_CONNECTOR && format('--vpc-connector={0}', vars.VPC_CONNECTOR) || '' }}
            ${{ vars.VPC_NETWORK && format('--network={0}', vars.VPC_NETWORK) || '' }}
            ${{ vars.VPC_SUBNET && format('--subnet={0}', vars.VPC_SUBNET) || '' }}
            ${{ (vars.VPC_CONNECTOR || vars.VPC_NETWORK) && '--vpc-egress=private-ranges-only' || '' }}
          env_vars: |
            APP_ENV=production
            APP_DEBUG=false
            KAFKA_ENABLED=${{ vars.KAFKA_ENABLED }}
            KAFKA_BOOTSTRAP_SERVERS=${{ vars.KAFKA_BOOTSTRAP_SERVERS }}
            KAFKA_TOPIC=${{ vars.KAFKA_TOPIC }}
            KAFKA_GROUP_ID=${{ vars.KAFKA_GROUP_ID }}
            KAFKA_CLIENT_ID=${{ vars.KAFKA_CLIENT_ID }}
            KAFKA_AUTO_OFFSET_RESET=${{ vars.KAFKA_AUTO_OFFSET_RESET }}
            KAFKA_SECURITY_PROTOCOL=${{ vars.KAFKA_SECURITY_PROTOCOL }}
            KAFKA_SASL_MECHANISM=${{ vars.KAFKA_SASL_MECHANISM }}
            KAFKA_SASL_USERNAME=${{ vars.KAFKA_SASL_USERNAME }}
          secrets: |
            DATABASE_URL=DATABASE_URL:latest
            ${{ vars.KAFKA_SASL_PASSWORD_SECRET && format('KAFKA_SASL_PASSWORD={0}:latest', vars.KAFKA_SASL_PASSWORD_SECRET) || '' }}
